<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#161e17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Reptile Logger</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Force any waiting service worker to activate immediately,
      // then reload so users get the latest code instead of stale cache.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().then(function(reg) {
          if (reg && reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
        });
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!window.__swReloaded) {
            window.__swReloaded = true;
            window.location.reload();
          }
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
